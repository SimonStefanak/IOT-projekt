<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tuner Game</title>
  <link rel="stylesheet" href="test_style.css">
</head>
<body>

  <div class="game-container">
    <div class="header">
      <span id="level-display">Level: 1/5</span>
    </div>

    <div class="target-section">
      <h2>Play this note:</h2>
      <h1 id="target">--</h1>
    </div>

    <div class="tuner-box">
      <div class="tuner-meter">
        <div class="center-marker"></div>
        <div class="safe-zone"></div>
        <div id="needle"></div>
      </div>
      <div class="tuner-labels">
        <span>Flat</span>
        <span id="cents">0 cents</span>
        <span>Sharp</span>
      </div>
    </div>

    <button id="btn" onclick="nextNote()" disabled>Play the correct note</button> <br> <br> <br>
    <a href="gauge.html" class="btn">Return to Tuner</a>
  </div>

  <script src="test_script.js"></script>
</body>
</html>
