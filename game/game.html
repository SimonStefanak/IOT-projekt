<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PITCH PIPES — Open-String Pitch Trainer</title>
  <link rel="stylesheet" href="game_style.css">
</head>
<body>
  <main class="device" aria-label="Pitch Pipes guitar trainer">
    <div class="bar">
      <div class="status">
        <span class="dot" id="dot"></span>
        <span><span class="lbl">SIGNAL</span><span id="link">—</span></span>
      </div>
      <div class="readout">
        <div class="note flat" id="note">—</div>
        <div class="freq" id="freq">—— Hz</div>
      </div>
      <div class="score">
        <span class="lbl">SCORE</span>
        <span class="val" id="score">0</span>
      </div>
    </div>

    <div class="screen" id="screen">
      <canvas id="game"></canvas>

      <div class="overlay" id="overOverlay" hidden>
        <div class="go-sub">SIGNAL LOST / GAME OVER</div>
        <div class="big" id="finalScore">0</div>
        <div class="best" id="bestScore">BEST 0</div>
        <button class="btn" id="againBtn">↻ Play again</button>
      </div>
    </div>

    <div class="footer">
      <div class="tuner" aria-label="tuning meter">
        <span class="gl">♭</span>
        <div class="track">
          <div class="ticks"></div>
          <div class="center"></div>
          <div class="needle" id="needle"></div>
        </div>
        <span class="gl">♯</span>
        <span class="cents" id="cents">—</span>
      </div>
      <div class="footrow">
        <div class="target">
          <span class="lbl">TARGET</span>
          <span class="val" id="target">—</span>
        </div>
        <span class="hint" id="hint">&nbsp;</span>
        <span class="brand">PP·6STR</span>
      </div>
    </div>
  </main>
  <script src="game_script.js"></script>
</body>
</html>
